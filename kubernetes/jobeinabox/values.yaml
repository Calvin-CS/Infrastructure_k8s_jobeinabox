image:
  registry: harbor.cs.calvin.edu/calvincs-private
  name: jobeinabox
  tag: latest
dns:
  name: k8s.cs.calvin.edu

# Allowed API keys for jobeinabox access.
# Requests must include header `X-API-KEY` matching one of these values.
apiKeys:
  - 738c698f-b603-4e00-9f25-f66dba16f47d
  - c0ef7472-79ec-44a0-81d8-3096457ecb4a
  - 40e15026-0455-487a-b49b-17e4f2e4b8fd
rollingUpdate:
  enabled: true
  maxSurge: "100%"
  maxUnavailable: "50%"
imagePullSecrets: [{name: regcred-dockerhub},{name: regcred-harbor}]

hpa:
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 600
      selectPolicy: Min
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60